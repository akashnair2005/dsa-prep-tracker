<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DSA Prep</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🚀 DSA Prep Platform</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="https://leetcode.com/" target="_blank">LeetCode</a>
    <a href="progress.html">Progress</a>
</nav>

<div class="search-container">
    <form id="search-form">
        <input type="text" id="question-number" placeholder="Enter question number">
        <button type="submit">Search</button>
    </form>
</div>

<main>

    <!-- LEFT SIDE -->
    <div id="result">
        <h2>Welcome</h2>
        <p>Search a question to begin</p>
    </div>

    <!-- RIGHT SIDE -->
    <div id="solution-panel">
        <h3>💡 Solution</h3>
        <pre id="solution-code">Click "View Answer" to see solution</pre>
    </div>

</main>

<footer>
    <p>© 2026 Akash</p>
</footer>

<script src="script.js"></script>

</body>
</html>
